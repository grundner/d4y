name: Release & Bundle

# ADR-0027: d4y läuft direkt auf dem Host (kein Container-Image mehr). Ausgeliefert wird ein
# selbst-enthaltendes jlink-Bundle (App + eingebettetes JRE) als GitHub-Release-Asset.
#  - Push auf main / Pull Request → nur verify (Build/Tests), kein Bundle
#  - Tag  vX.Y.Z                  → Bundle bauen und an das GitHub-Release hängen
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build & Test (inkl. Frontend)
        run: ./gradlew build --console=plain

  bundle:
    # Bundle + Release-Asset nur bei Tag vX.Y.Z. Multi-Arch (ADR-0027): je Architektur ein eigener
    # nativer Runner — jlink/jpackage bauen plattformspezifisch, keine Cross-Compilation.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Version bestimmen
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"   # vX.Y.Z → X.Y.Z

      - name: Bundle bauen (jlink + jpackage, inkl. Frontend)
        run: ./gradlew clean bundleTar -Pversion=${{ steps.meta.outputs.version }} --console=plain

      - name: Release-Asset hochladen (${{ matrix.arch }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          ASSET="d4y-linux-${{ matrix.arch }}.tar.gz"
          cp "build/dist/d4y-${VERSION}.tar.gz" "${ASSET}"
          # Release idempotent anlegen (Matrix-Jobs laufen parallel — Race mit || true abfangen).
          if ! gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release create "v${VERSION}" --title "v${VERSION}" --notes "d4y ${VERSION}" || true
          fi
          gh release upload "v${VERSION}" "${ASSET}" --clobber
