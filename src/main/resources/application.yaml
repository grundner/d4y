server:
  port: 8080

spring:
  application:
    name: d4y

d4y:
  docker:
    socket-path: /var/run/docker.sock
    # Leerer API-Versions-Präfix: die Engine wählt ihre Default-Version.
    api-version: ""
  desired-state:
    # ADR-0011 (Interim): lokales Verzeichnis als Sollzustand, später Git.
    path: ./desired
  reconcile:
    interval-ms: 15000
  ingress:
    # ADR-0027: d4y läuft direkt auf dem Host. Die eigene Traefik-Route wird über den File-Provider
    # deklariert (Ziel = Host-Gateway). host leer ⇒ keine Selbst-Route (lokaler/Dev-Betrieb).
    #
    # ADR-0028: TLS ist pro Route/Selbst-Route schaltbar. Ohne ACME-Mail (d4y.ingress.tls.acme.email)
    # ist der Default HTTP-only (VM ohne Public IP) — d4y + Apps sind sofort per http:// erreichbar.
    # Überschreiben per Env: D4Y_INGRESS_TLS_DEFAULT_ENABLED, D4Y_INGRESS_SELF_TLS (true|false),
    # je Route via 'tls: true|false' im Desired-State (siehe docs/architecture/desired-state-yaml.md).
    self:
      host: ${D4Y_HOST:}
      target: ${D4Y_INGRESS_SELF_TARGET:http://host.docker.internal:8080}
      dynamic-dir: ${D4Y_INGRESS_SELF_DYNAMIC_DIR:/var/lib/d4y/traefik-dynamic}
  operations:
    hold:
      default-seconds: 900
      max-seconds: 3600
    logs:
      default-tail: 200
  # Push-Trigger (ADR-0023) + gelieferte Image/Container-Secrets (ADR-0024).
  # host/d4y-Credentials — via Umgebungsvariablen setzen, NICHT ins Repo committen.
  trigger:
    token: ${D4Y_TRIGGER_TOKEN:}          # leer ⇒ POST /api/reconcile deaktiviert (fail-closed)
  secrets:
    encryption-key: ${D4Y_SECRETS_ENCRYPTION_KEY:}  # leer ⇒ gelieferte Secrets nur im RAM
    file: ./.d4y-secrets                  # Ablage des AES-GCM-verschlüsselten Secret-Stores

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    io.d4y: INFO
